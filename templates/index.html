{% extends "base.html" %}
{% block content %}

<h1>Users</h1>
    {% for user in users %}
    <div class="user-card">
        <h3>{{ user.name }}</h3>

        <a href="{{ url_for('get_user_movies', user_id=user.id) }}"
           class="btn">
            View Movies
        </a>
    </div>
    {% endfor %}

    <h3>Add New User</h3>

    <form action="{{ url_for('create_user') }}" method="POST">
    <input
        type="text"
        name="username"
        placeholder="User name"
        required
    >
    <button type="submit">Add User</button>
</form>


{% endblock %}
